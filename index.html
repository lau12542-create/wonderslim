<head>

<title>Welcome To Wonderslim</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
}

.background-layer{
    position:fixed;

    width:100%;
    height:100%;
    z-index:-1;
}

.background-layer img{
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0.5;
}

.content{
    position:relative;
    z-index:1;
    text-align:center;
    color:white;
    padding-top:150px;
}

h1{
    font-size:60px;
}

p{
    font-size:24px;
}

</style>
</head>

<body>

<div class="background-layer">
    <img src="https://lau12542-create.github.io/wonderslim/wonderslim/wonderslimmain.jpeg" alt="Background">
</div>

</div>

</body>
</html>
