<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome To Wonderslim</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    min-height:100vh;

    /* 背景图片 */
    background-image:url('https://lau12542-create.github.io/wonderslim/wonderslim/wonderslimmain.jpeg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

/* 黑色遮罩 */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    z-index:0;
}

/* 内容 */
.content{
    position:relative;
    z-index:1;
    text-align:center;
    color:white;
    padding-top:200px;
}

.content h1{
    font-size:60px;
    margin-bottom:20px;
}

.content p{
    font-size:24px;
}

.btn{
    margin-top:30px;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#ffffff;
    color:#333;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="content">
    <h1>Welcome To Wonderslim</h1>
    <p>Your Beauty & Wellness Journey Starts Here</p>

    <button class="btn">Book Now</button>
</div>

</body>
</html>
