<html>
<head>
	<title>welcometowonderslim</title>
<style>

	body {
  	font-family: Arial, sans-serif;
  	background: #ADD8E6;
  	margin: 0;
  	overflow-y: auto;
    }
  .background-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
    }

    .background-layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.4;
    }
	
	.overlay {
  	position: fixed;
  	top: 0;
  	left: 0;
  	width: 100%;
  	height: 100%;
  	background-color: rgba(0,0,0,0.7);
  	opacity: 0;
  	transition: opacity 0.3s ease;
  	pointer-events: none;
  	z-index: 998;
   }

	.overlay.active {
  	opacity: 1;
   }

	.content {
      	flex-grow: 1;
     	 margin-left: 180px;
      	transition: margin-left 0.3s ease;
      	padding: 20px;
    }

	.booking-row {
  	display: flex;
  	gap: 15px;
  	margin-top: 80px;
  	align-items: center;
	flex-wrap: wrap;
    }

	.booking-row input,
	.booking-row button {
  	padding: 10px;
  	font-size: 16px;
  	border-radius: 5px;
  	border: 1px solid #ccc;
    }

	.booking-row button {
  	background-color: #2c3e50;
  	color: white;
  	border: none;
  	cursor: pointer;
  	transition: background-color 0.3s ease;
    }

	.booking-row button:hover {
  	background-color: #1a242f;
    }

	table.room-table {
     	border-collapse: collapse;
      	width: 100%;
      	font-family: Arial, sans-serif;
     }

    	th, td {
     	padding: 12px;
      	border: 1px solid #ccc;
      	text-align: center;
    }

    	thead {
       	background-color: #2c3e50;
      	color: white;
     }

    	tbody tr:nth-child(even) {
       background-color: #f9f9f9;
    }

	.room-table img {
      	width: 250px;
      	height: 200px;
      	object-fit: cover;
    }

	.room-table button {
  	margin-left: 10px;
  	padding: 6px 12px;
  	background-color: #2c3e50;
  	color: white;
  	border: none;
  	border-radius: 4px;
  	cursor: pointer;
  	transition: background-color 0.3s ease;
    }

	.room-table button:hover {
  	background-color: #1a242f;
    }

	#summary {
      margin: 30px 0;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
    }

    #summary h2 {
      margin-top: 0;
      color: #2c3e50;
    }

   </style>
</head>

<body>
	<div class="background-layer">
    <img src="wonderslimlogo.jpeg" alt="background" />
  </div>
	
</body>
</html>
